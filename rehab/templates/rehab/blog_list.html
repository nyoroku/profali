{% extends 'base.html' %}

{% block content %}
<section class="py-12 md:py-20 bg-ice-blue/20 min-h-screen">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-12">
      <h1 class="heading-font text-3xl md:text-4xl font-bold text-navy mb-4 relative inline-block">
        Spiritual Insights
        <span class="block w-16 h-1 bg-coral mx-auto mt-3 rounded-full"></span>
      </h1>
      <p class="text-navy/70 mt-4 max-w-2xl mx-auto">Explore ancient wisdom and natural guides to spiritual
        enlightenment and divine health.</p>
    </div>

    <div class="space-y-6 max-w-4xl mx-auto">
      {% for blog in blogs %}
      <a href="{% url 'rehab:blog-detail' blog.id %}" class="group block">
        <div
          class="bg-white rounded-2xl shadow-md hover:shadow-xl p-6 md:p-8 transform hover:-translate-y-1 transition-all duration-300">
          <h2
            class="heading-font text-xl md:text-2xl font-bold text-navy group-hover:text-coral transition-colors duration-300 mb-2">
            {{ blog.title|capfirst }}</h2>
          <div class="text-sm text-navy/50 mb-3">
            <i class="far fa-calendar-alt mr-2"></i>{{ blog.created }}
          </div>
          <div class="text-navy/60 leading-relaxed text-sm line-clamp-2 md:line-clamp-none">{{ blog.summary|safe }}
          </div>
          <div class="mt-4 inline-flex items-center text-coral font-bold group-hover:gap-1 transition-all">
            Read Insight <i class="fas fa-arrow-right ml-2 text-xs"></i>
          </div>
        </div>
      </a>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
